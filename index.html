<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Weather API Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div class="weather-card" id="weather-card">
        <!-- Поле поиска -->
        <div class="search-container">
            <input type="text" id="city-input" placeholder="Введите город (например: Urganch)..." autocomplete="off">
            <button id="search-btn">🔍</button>
        </div>

        <!-- Экстренное предупреждение от ИИ (появляется при >40°C) -->
        <div class="alert-banner" id="alert-banner" style="display: none;">
            <span class="alert-icon">⚠️</span>
            <p id="alert-text">Внимание: зафиксированы опасные атмосферные условия!</p>
        </div>

        <!-- Главный экран погоды -->
        <div class="main-weather animate-fade">
            <div id="weather-emoji" class="weather-illustration">☀️</div>
            <h1 id="city-name">Загрузка...</h1>
            <div class="temp-display"><span id="temperature">--</span>°C</div>
            <p id="weather-status">Получение данных...</p>
        </div>

        <!-- Умный виджет Ультрафиолета (UV) -->
        <div class="uv-widget">
            <div class="uv-header">
                <span>Индекс УФ-лучей: <strong id="uv-val">0</strong></span>
                <span id="uv-level" class="badge-uv">--</span>
            </div>
            <div class="uv-bar-container">
                <div class="uv-bar-fill" id="uv-fill" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Сетка продвинутых метрик из API -->
        <div class="metrics-grid">
            <div class="metric-item">
                <span class="metric-icon">🔥</span>
                <div class="metric-info">
                    <p class="metric-label">Тепловой индекс</p>
                    <p class="metric-value"><span id="heat-index">--</span>°C</p>
                </div>
            </div>
            <div class="metric-item">
                <span class="metric-icon">💧</span>
                <div class="metric-info">
                    <p class="metric-label">Влажность</p>
                    <p class="metric-value"><span id="humidity">--</span>%</p>
                </div>
            </div>
            <div class="metric-item">
                <span class="metric-icon">💨</span>
                <div class="metric-info">
                    <p class="metric-label">Ветер</p>
                    <p class="metric-value"><span id="wind">--</span> км/ч</p>
                </div>
            </div>
        </div>

        <!-- Интерактивный советник по выживанию -->
        <div class="advisor-box">
            <div class="advisor-title">🤖 Рекомендация ИИ-Смотрителя:</div>
            <p id="advisor-content">Анализирую погодные условия для составления рекомендаций...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
